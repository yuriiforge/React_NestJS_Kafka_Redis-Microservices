services:

  # ── Message Broker ────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/2181"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic orders --partitions 3 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic payments --partitions 3 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic deliveries --partitions 3 --replication-factor 1"

  kafka-ui:
    image: provectuslabs/kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  # ── Storage ───────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Observability ─────────────────────────────────────────────

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Migration runner ──────────────────────────────────────────

  migration-runner:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
      target: deps
    command: >
      sh -c "
      /app/node_modules/.bin/prisma migrate deploy
      --schema=/app/shared/prisma/schema.prisma
      "
    env_file: ./auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── Microservices ─────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3006:3006"
    env_file: ./auth-service/.env
    command: node dist/main.js
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3007:3007"
    env_file: ./product-service/.env
    command: node dist/main.js
    depends_on:
      migration-runner:
        condition: service_completed_successfully

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: ./order-service/.env
    command: node dist/main.js
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: ./payment-service/.env
    command: node dist/main.js
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  delivery-service:
    build:
      context: .
      dockerfile: ./delivery-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file: ./delivery-service/.env
    command: node dist/main.js
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: ./analytics-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file: ./analytics-service/.env
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: ./search-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
    depends_on:
      elasticsearch:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./api-gateway/.env
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
      - delivery-service
      - analytics-service
      - search-service

  # ── Frontend ──────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      target: prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

# ── Volumes ───────────────────────────────────────────────────

volumes:
  zookeeper_data:
  kafka_data:
  postgres_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:



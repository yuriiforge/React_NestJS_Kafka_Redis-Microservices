      target: dev
    volumes:
      - ./delivery-service/src:/app/delivery-service/src
    environment:
      CHOKIDAR_USEPOLLING: "true"

  analytics-service:
    build:
      context: .
      dockerfile: ./analytics-service/Dockerfile
      target: dev
    volumes:
      - ./analytics-service/src:/app/analytics-service/src
    environment:
      CHOKIDAR_USEPOLLING: "true"

  search-service:
    build:
      context: .
      dockerfile: ./search-service/Dockerfile
      target: dev
    volumes:
      - ./search-service/src:/app/search-service/src
    environment:
      CHOKIDAR_USEPOLLING: "true"

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
      target: dev
    volumes:
      - ./api-gateway/src:/app/api-gateway/src
    environment:
      CHOKIDAR_USEPOLLING: "true"

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"

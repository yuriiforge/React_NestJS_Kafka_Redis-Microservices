name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"

    steps:
      # ── 1. Code ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore .env files from server ─────────────────────
      # .env files are gitignored. They live at ~/envs/ on the EC2
      # instance and are copied into the workspace on every deploy.
      - name: Copy env files
        run: |
          cp ~/envs/auth-service.env        auth-service/.env
          cp ~/envs/api-gateway.env         api-gateway/.env
          cp ~/envs/product-service.env     product-service/.env
          cp ~/envs/order-service.env       order-service/.env
          cp ~/envs/payment-service.env     payment-service/.env
          cp ~/envs/delivery-service.env    delivery-service/.env
          cp ~/envs/analytics-service.env   analytics-service/.env
          cp ~/envs/search-service.env      search-service/.env

      # ── 3. Inject production secrets ──────────────────────────
      - name: Patch JWT_SECRET
        run: |
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" auth-service/.env
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" api-gateway/.env

      # ── 4. Build only services whose source changed ──────────────
      - name: Build changed services
        run: |
          PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "")

          # Returns 0 (true) when the service needs a rebuild
          needs_rebuild() {
            local svc_dir=$1
            # First-ever push: build everything
            [ -z "$PREV" ] && return 0
            # shared/ or workspace manifests changed → all services affected
            git diff --quiet "$PREV" HEAD -- shared/ package.json package-lock.json 2>/dev/null || return 0
            # Service-specific directory changed
            [ -n "$svc_dir" ] && git diff --quiet "$PREV" HEAD -- "$svc_dir/" 2>/dev/null || return 0
            return 1
          }

          build() {
            local svc=$1 dir=${2:-$1}
            if needs_rebuild "$dir"; then
              echo "▶ building $svc"
              docker compose build "$svc"
            else
              echo "✔ skipping $svc (no changes)"
            fi
          }

          build migration-runner shared
          build auth-service
          build product-service
          build order-service
          build payment-service
          build delivery-service
          build analytics-service
          build search-service
          build api-gateway
          build frontend

      # ── 5. Stop old containers (removes orphaned services) ───────
      - name: Stop containers
        run: docker compose down --remove-orphans

      # ── 6. Start all containers ───────────────────────────────
      - name: Start containers
        run: docker compose up -d

      # ── 7. Seed database ──────────────────────────────────────
      - name: Seed database
        run: docker compose run --rm migration-runner sh -c "cd /app/shared && npm run seed"

      # ── 8. Health check ───────────────────────────────────────
      - name: Wait for Kafka then assert all services are up
        run: |
          echo "Waiting for Kafka to become healthy (up to 3 min)..."
          for i in $(seq 1 18); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' \
              $(docker compose ps -q kafka) 2>/dev/null || echo "unknown")
            echo "  ($i) kafka: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 10
          done

          docker compose ps

          FAILED=$(docker compose ps --format json \
            | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          services = [json.loads(l) for l in data.splitlines() if l.strip()]
          failed = [s['Name'] for s in services if s.get('State') != 'running']
          print('\n'.join(failed))
          ")
          if [ -n "$FAILED" ]; then
            echo "The following containers are NOT running:"
            echo "$FAILED"
            docker compose logs --tail=50
            exit 1
          fi
          echo "All containers running."

      # ── 9. Cleanup ────────────────────────────────────────────
      - name: Remove dangling images
        run: docker image prune -f --filter "until=24h"

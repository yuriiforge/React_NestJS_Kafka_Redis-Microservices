name: Deploy to EC2

on:
  push:
    branches: [main]

# Prevent two deploys running simultaneously
concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30

    steps:
      # ── 1. Code ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Inject production secrets ──────────────────────────
      # All other env vars (DB URL, Kafka, ES) use Docker-internal
      # addresses that are safe to keep in the repo. Only JWT_SECRET
      # must come from GitHub Secrets (Settings → Secrets → Actions).
      - name: Patch JWT_SECRET
        run: |
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" auth-service/.env
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" api-gateway/.env

      # ── 3. Build & start ──────────────────────────────────────
      - name: Build images and restart containers
        run: docker compose up --build -d

      # ── 4. Health check ───────────────────────────────────────
      - name: Wait for services to become healthy
        run: |
          echo "Waiting 30 s for containers to initialise..."
          sleep 30
          docker compose ps

      - name: Assert critical services are up
        run: |
          FAILED=$(docker compose ps --format json \
            | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          # docker compose ps --format json returns one JSON object per line
          services = [json.loads(l) for l in data.splitlines() if l.strip()]
          failed = [s['Name'] for s in services if s.get('State') != 'running']
          print('\n'.join(failed))
          ")
          if [ -n "$FAILED" ]; then
            echo "The following containers are NOT running:"
            echo "$FAILED"
            docker compose logs --tail=50
            exit 1
          fi
          echo "All containers running."

      # ── 5. Cleanup ────────────────────────────────────────────
      - name: Remove dangling images
        run: docker image prune -f

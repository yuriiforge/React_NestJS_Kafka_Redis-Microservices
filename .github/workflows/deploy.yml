name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 60

    steps:
      # ── 1. Code ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Restore .env files from server ─────────────────────
      # .env files are gitignored. They live at ~/envs/ on the EC2
      # instance and are copied into the workspace on every deploy.
      - name: Copy env files
        run: |
          cp ~/envs/auth-service.env        auth-service/.env
          cp ~/envs/api-gateway.env         api-gateway/.env
          cp ~/envs/product-service.env     product-service/.env
          cp ~/envs/order-service.env       order-service/.env
          cp ~/envs/payment-service.env     payment-service/.env
          cp ~/envs/delivery-service.env    delivery-service/.env
          cp ~/envs/analytics-service.env   analytics-service/.env
          cp ~/envs/search-service.env      search-service/.env

      # ── 3. Inject production secrets ──────────────────────────
      - name: Patch JWT_SECRET
        run: |
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" auth-service/.env
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" api-gateway/.env

      # ── 4. Build images one by one to avoid RAM/network exhaustion ──
      - name: Build images sequentially
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker compose build migration-runner
          docker compose build auth-service
          docker compose build product-service
          docker compose build order-service
          docker compose build payment-service
          docker compose build delivery-service
          docker compose build analytics-service
          docker compose build search-service
          docker compose build api-gateway
          docker compose build frontend

      # ── 5. Stop old containers (removes orphaned services) ───────
      - name: Stop containers
        run: docker compose down --remove-orphans

      # ── 6. Start all containers ───────────────────────────────
      - name: Start containers
        run: docker compose up -d

      # ── 7. Seed database ──────────────────────────────────────
      - name: Seed database
        run: docker compose run --rm migration-runner sh -c "cd /app/shared && npm run seed"

      # ── 8. Health check ───────────────────────────────────────
      - name: Wait for services to become healthy
        run: |
          echo "Waiting 30 s for containers to initialise..."
          sleep 30
          docker compose ps

      - name: Assert critical services are up
        run: |
          FAILED=$(docker compose ps --format json \
            | python3 -c "
          import sys, json
          data = sys.stdin.read().strip()
          services = [json.loads(l) for l in data.splitlines() if l.strip()]
          failed = [s['Name'] for s in services if s.get('State') != 'running']
          print('\n'.join(failed))
          ")
          if [ -n "$FAILED" ]; then
            echo "The following containers are NOT running:"
            echo "$FAILED"
            docker compose logs --tail=50
            exit 1
          fi
          echo "All containers running."

      # ── 9. Cleanup ────────────────────────────────────────────
      - name: Remove dangling images
        run: docker image prune -f
